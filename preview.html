<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>RoomReady</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%; overflow: hidden;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    cursor: none;
  }

  /* ═══════════════ COLOR BARS (default idle state) ═══════════════ */
  #colorbars {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    background: #000;
  }
  /* Upper 75% — 8 classic TV test-card bars (SMPTE/EBU 100%) */
  #bars-main {
    flex: 8;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
  }
  #bars-main > div {
    width: 100%; height: 100%;
  }
  /* Lower 25% — castellations / PLUGE bar */
  #bars-lower {
    flex: 2;
    display: grid;
    grid-template-columns: repeat(4, 1fr) 2fr repeat(4, 1fr);
  }
  #bars-lower > div {
    width: 100%; height: 100%;
  }

  /* Moving shimmer sweep — bewegende glans van links naar rechts */
  #bars-shimmer {
    position: fixed; top: 0; bottom: 0; width: 18%;
    background: linear-gradient(to right,
      transparent 0%,
      rgba(255,255,255,0.08) 35%,
      rgba(255,255,255,0.24) 50%,
      rgba(255,255,255,0.08) 65%,
      transparent 100%);
    mix-blend-mode: overlay;
    pointer-events: none;
    animation: shimmer 9s linear infinite;
  }
  @keyframes shimmer {
    0%   { left: -22%; }
    100% { left: 105%; }
  }
  /* Diagonale stripes — langzaam scrollend, subtiel maar levend */
  #bars-stripes {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent 0,
      transparent 28px,
      rgba(255,255,255,0.05) 28px,
      rgba(255,255,255,0.05) 56px
    );
    pointer-events: none;
    mix-blend-mode: overlay;
    animation: stripeScroll 12s linear infinite;
  }
  @keyframes stripeScroll {
    from { background-position: 0 0; }
    to   { background-position: 80px 80px; }
  }
  /* Hue-pulse — heel subtiele saturatie-puls op de hoofdbalken */
  #bars-main {
    animation: huePulse 18s ease-in-out infinite;
  }
  @keyframes huePulse {
    0%, 100% { filter: saturate(1) brightness(1); }
    50%      { filter: saturate(1.15) brightness(1.05); }
  }
  /* Subtiele scanlines — zachte horizontale ribbel zoals oude TV-card */
  #bars-scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0,
      transparent 3px,
      rgba(0,0,0,0.06) 3px,
      rgba(0,0,0,0.06) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  /* Center logo badge op bars */
  #idle-logo {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.72);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 24px;
    padding: 38px 70px;
    text-align: center;
    backdrop-filter: blur(6px);
    animation: logoFade 4s ease-in-out infinite;
  }
  @keyframes logoFade {
    0%,100% { opacity: 0.85; }
    50%     { opacity: 1; }
  }
  #idle-logo-text {
    font-size: 6vw; font-weight: 900;
    letter-spacing: 0.3vw;
    line-height: 1;
    color: #fff;
  }
  #idle-logo-text b { color: #4ade80; }
  #idle-logo-sub {
    font-size: 1.2vw; font-weight: 300;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.4vw;
    margin-top: 14px;
    text-transform: uppercase;
  }

  /* Klok onderin */
  #idle-clock {
    position: fixed; bottom: 40px; left: 0; right: 0;
    text-align: center;
    font-size: 1.6vw; font-weight: 300;
    color: rgba(255,255,255,0.7);
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    background: rgba(0,0,0,0.5);
    padding: 6px 0;
  }
  #idle-date {
    display: inline-block;
    margin-left: 24px;
    color: rgba(255,255,255,0.5);
    text-transform: capitalize;
  }

  /* ═══════════════ OTHER STATES (overlay on colorbars) ═══════════════ */
  .state-overlay {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 30px;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(8px);
    opacity: 0; transition: opacity 0.5s ease;
  }
  body.state-ready   #overlay-ready   { display: flex; opacity: 1; background: radial-gradient(ellipse at center, rgba(13,51,36,0.96) 0%, rgba(6,21,16,0.98) 100%); }
  body.state-testing #overlay-testing { display: flex; opacity: 1; }
  body.state-failed  #overlay-failed  { display: flex; opacity: 1; background: radial-gradient(ellipse at center, rgba(42,26,26,0.96) 0%, rgba(24,10,10,0.98) 100%); }

  /* Geanimeerd testsignaal — SMPTE-achtige kleurenbalken, flitsender */
  #test-bars {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 1;
  }
  body.state-testing #test-bars { opacity: 1; }
  .test-bar {
    position: relative;
    animation: barPulse 1.6s ease-in-out infinite;
    overflow: hidden;
  }
  /* Geanimeerd glow-band-overlay per bar voor extra leven */
  .test-bar::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
    transform: translateY(-100%);
    animation: barSweep 4s ease-in-out infinite;
    mix-blend-mode: overlay;
  }
  .test-bar:nth-child(1) { background: #d8d8d8; animation-delay: 0s; }
  .test-bar:nth-child(2) { background: #d4d400; animation-delay: -0.2s; }
  .test-bar:nth-child(3) { background: #00d4d4; animation-delay: -0.4s; }
  .test-bar:nth-child(4) { background: #00d000; animation-delay: -0.6s; }
  .test-bar:nth-child(5) { background: #d000d0; animation-delay: -0.8s; }
  .test-bar:nth-child(6) { background: #e02020; animation-delay: -1.0s; }
  .test-bar:nth-child(7) { background: #2020e8; animation-delay: -1.2s; }
  .test-bar:nth-child(1)::after { animation-delay: 0s; }
  .test-bar:nth-child(2)::after { animation-delay: -0.5s; }
  .test-bar:nth-child(3)::after { animation-delay: -1.0s; }
  .test-bar:nth-child(4)::after { animation-delay: -1.5s; }
  .test-bar:nth-child(5)::after { animation-delay: -2.0s; }
  .test-bar:nth-child(6)::after { animation-delay: -2.5s; }
  .test-bar:nth-child(7)::after { animation-delay: -3.0s; }
  @keyframes barPulse {
    0%,100% { filter: brightness(0.85) saturate(1.0); }
    50%     { filter: brightness(1.35) saturate(1.6); }
  }
  @keyframes barSweep {
    0%   { transform: translateY(-100%); }
    50%  { transform: translateY(100%); }
    100% { transform: translateY(100%); }
  }
  /* Diagonale shimmer-band beweegt tijdens testing */
  body.state-testing::before {
    content: '';
    position: fixed; inset: 0;
    background: linear-gradient(115deg,
      transparent 0%, transparent 40%,
      rgba(255,255,255,0.18) 49%,
      rgba(255,255,255,0.32) 50%,
      rgba(255,255,255,0.18) 51%,
      transparent 60%, transparent 100%);
    background-size: 300% 300%;
    animation: testShimmer 3.5s linear infinite;
    pointer-events: none;
    z-index: 2;
    mix-blend-mode: overlay;
  }
  @keyframes testShimmer {
    from { background-position: 0% 0%; }
    to   { background-position: 200% 200%; }
  }
  /* Glas-kaart voor leesbare tekst BOVEN de bars + diagonale shimmer.
     overlay-testing zelf moet z-index > 2 hebben anders verbergt body::before
     (z-index:2, mix-blend-overlay) de testing-card door op 'm te blenden. */
  body.state-testing #overlay-testing {
    background: transparent;
    z-index: 10;
  }
  body.state-testing #overlay-testing > * { position: relative; }
  .testing-card {
    background: rgba(8,12,20,0.72);
    backdrop-filter: blur(28px) saturate(140%);
    -webkit-backdrop-filter: blur(28px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 32px;
    padding: 60px 90px;
    display: flex; flex-direction: column; gap: 30px;
    align-items: center;
    box-shadow:
      0 20px 80px rgba(0,0,0,0.55),
      0 0 0 1px rgba(255,255,255,0.06) inset,
      0 0 60px rgba(96,128,224,0.15);
    animation: cardGlow 4s ease-in-out infinite;
  }
  @keyframes cardGlow {
    0%,100% { box-shadow: 0 20px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06) inset, 0 0 60px rgba(96,128,224,0.15); }
    50%     { box-shadow: 0 20px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.10) inset, 0 0 100px rgba(96,128,224,0.30); }
  }

  #ready-text {
    font-size: 18vw; font-weight: 900;
    letter-spacing: 0.5vw; line-height: 0.9;
    color: #4ade80;
    text-shadow:
      0 0 30px rgba(74,222,128,0.6),
      0 0 80px rgba(74,222,128,0.4),
      0 0 140px rgba(74,222,128,0.2);
    animation: readyPulse 2.5s ease-in-out infinite;
  }
  #ready-sub {
    font-size: 2.5vw; font-weight: 300;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.2vw;
  }
  @keyframes readyPulse {
    0%,100% { text-shadow: 0 0 30px rgba(74,222,128,0.6), 0 0 80px rgba(74,222,128,0.4), 0 0 140px rgba(74,222,128,0.2); }
    50%     { text-shadow: 0 0 50px rgba(74,222,128,0.8), 0 0 120px rgba(74,222,128,0.5), 0 0 180px rgba(74,222,128,0.3); }
  }

  .testing-spinner {
    width: 8vw; height: 8vw;
    border: 0.5vw solid rgba(120,160,240,0.2);
    border-top-color: #80a0f0;
    border-right-color: rgba(160,200,250,0.4);
    border-radius: 50%;
    animation: spin 1.2s linear infinite;
    box-shadow: 0 0 30px rgba(96,128,224,0.4);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #testing-text {
    font-size: 4.5vw; font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.05vw;
    text-align: center;
    text-shadow: 0 2px 24px rgba(0,0,0,0.6);
  }
  #testing-sub {
    font-size: 1.6vw; font-weight: 400;
    color: rgba(255,255,255,0.85);
    text-align: center;
    text-shadow: 0 1px 12px rgba(0,0,0,0.5);
  }

  #failed-text {
    font-size: 7vw; font-weight: 700;
    color: #f59e0b;
    letter-spacing: 0.2vw;
  }
  #failed-sub {
    font-size: 2vw; font-weight: 300;
    color: rgba(255,255,255,0.55);
  }

  /* Esc hint */
  #esc-hint {
    position: fixed; top: 15px; right: 20px;
    font-size: 0.8vw; font-weight: 300;
    color: rgba(255,255,255,0.1);
    z-index: 100;
  }
</style>
</head>
<body class="state-idle">

<!-- Idle: Color bars -->
<div id="colorbars">
  <div id="bars-main">
    <div style="background:#ffffff;"></div>
    <div style="background:#ffff00;"></div>
    <div style="background:#00ffff;"></div>
    <div style="background:#00ff00;"></div>
    <div style="background:#ff00ff;"></div>
    <div style="background:#ff0000;"></div>
    <div style="background:#0000ff;"></div>
    <div style="background:#000000;"></div>
  </div>
  <div id="bars-lower">
    <!-- PLUGE-achtige rij: donkere blauw/zwart/magenta/cyan + gradient -->
    <div style="background:#0000ff;"></div>
    <div style="background:#000000;"></div>
    <div style="background:#ff00ff;"></div>
    <div style="background:#000000;"></div>
    <div style="background:linear-gradient(to right, #000 0%, #808080 50%, #fff 100%);"></div>
    <div style="background:#000000;"></div>
    <div style="background:#0a0a0a;"></div>
    <div style="background:#141414;"></div>
    <div style="background:#1e1e1e;"></div>
  </div>
</div>
<div id="bars-stripes"></div>
<div id="bars-shimmer"></div>
<div id="bars-scanlines"></div>

<!-- Logo badge + clock always visible op de bars -->
<div id="idle-logo">
  <div id="idle-logo-text"><b>Room</b>Ready</div>
  <div id="idle-logo-sub">Standby · AV systeem actief</div>
</div>

<div id="idle-clock">
  <span id="clock-time">––:––</span>
  <span id="idle-date">–</span>
</div>

<!-- Ready state overlay -->
<div id="overlay-ready" class="state-overlay">
  <div id="ready-text">Room = Ready</div>
  <div id="ready-sub">De vergaderruimte is gereed voor gebruik</div>
</div>

<!-- Testing state overlay -->
<div id="test-bars">
  <div class="test-bar"></div>
  <div class="test-bar"></div>
  <div class="test-bar"></div>
  <div class="test-bar"></div>
  <div class="test-bar"></div>
  <div class="test-bar"></div>
  <div class="test-bar"></div>
</div>
<div id="overlay-testing" class="state-overlay">
  <div class="testing-card">
    <div class="testing-spinner"></div>
    <div id="testing-text">Kamer wordt voorbereid</div>
    <div id="testing-sub">Een moment geduld alstublieft</div>
    <img id="cam-preview" alt="" style="display:none;width:32vw;max-width:520px;aspect-ratio:16/9;object-fit:cover;border-radius:18px;border:1px solid rgba(255,255,255,0.2);box-shadow:0 12px 40px rgba(0,0,0,0.5);background:#000;">
  </div>
</div>

<!-- Failed state overlay -->
<div id="overlay-failed" class="state-overlay">
  <div id="failed-text">⚠ Kamer wordt nagekeken</div>
  <div id="failed-sub">Uw technicus is op de hoogte</div>
</div>

<div id="esc-hint">Esc om te sluiten</div>

<script>
  window.addEventListener('keydown', e => { if (e.key === 'Escape') window.close() })

  const clockEl = document.getElementById('clock-time')
  const dateEl  = document.getElementById('idle-date')
  function updateClock() {
    const d = new Date()
    clockEl.textContent = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`
    const dags = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag']
    const mnds = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december']
    dateEl.textContent = `${dags[d.getDay()]} ${d.getDate()} ${mnds[d.getMonth()]}`
  }
  updateClock(); setInterval(updateClock, 10000)

  // BroadcastChannel voor state-sync met hoofdvenster
  const bc = new BroadcastChannel('roomready-state')
  const tTitle = document.getElementById('testing-text')
  const tSub   = document.getElementById('testing-sub')
  const _defaultTitle = tTitle?.textContent || 'Kamer wordt voorbereid'
  const _defaultSub   = tSub?.textContent   || 'Een moment geduld alstublieft'
  const camPreview = document.getElementById('cam-preview')

  function applyUpdate(data) {
    if (!data) return
    if (data.state) {
      document.body.className = 'state-' + data.state
      if (data.state !== 'testing' && tTitle && tSub) {
        tTitle.textContent = _defaultTitle
        tSub.textContent   = _defaultSub
      }
      // Bij overgang weg van testing: cam-preview verbergen
      if (data.state !== 'testing' && camPreview) {
        camPreview.style.display = 'none'
        camPreview.src = ''
      }
    }
    if (data.stepName && tTitle) tTitle.textContent = data.stepName
    if (data.stepSub  && tSub)   tSub.textContent   = data.stepSub
    // Camera-frame: lege string = verbergen, dataURL = tonen + updaten.
    if (data.cameraFrame !== undefined && camPreview) {
      if (data.cameraFrame) {
        camPreview.src = data.cameraFrame
        camPreview.style.display = 'block'
      } else {
        camPreview.style.display = 'none'
        camPreview.src = ''
      }
    }
  }
  // Twee kanalen: BroadcastChannel + IPC via preload-bridge. Welke 't
  // eerst aankomt updatet de UI; idempotent dus dubbele berichten geen
  // probleem.
  bc.onmessage = e => applyUpdate(e.data)
  if (window.rrBridge?.onPreviewUpdate) {
    window.rrBridge.onPreviewUpdate(applyUpdate)
  }
  bc.postMessage({ query: 'state' })
</script>
</body>
</html>
